name: CI

# The gate of record (Beat 10). Enable branch protection on the PR's base branch and
# mark these jobs as REQUIRED status checks + require a human approver in branch protection.
# Nothing merges without all green AND a named human approval.

on:
  pull_request:
  push:
    branches: [main]   # demo-start is intentionally broken; validate it via PRs, not push

permissions:
  contents: read
  pull-requests: write

jobs:
  test:
    name: tests (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements-dev.txt
      - run: python scripts/seed_db.py
      - run: pytest -q

  lint:
    name: lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install ruff
      - run: ruff check services/statements/app services/statements/tests scripts

  secrets:
    name: secret scan (gitleaks)
    runs-on: ubuntu-latest
    # PR-only: scans the PR's commits. On the seeded branches the planted secret lives in
    # history by design (and is caught locally by the pre-commit hook), so a push-event
    # full-history scan would always fail — that's expected, not a CI signal.
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  iac:
    name: IaC scan (tfsec)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: aquasecurity/tfsec-action@v1.0.3
        with:
          working_directory: infra/terraform

  sast:
    name: SAST (semgrep)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install semgrep
      # SAST on application code; IaC is covered by the tfsec job above.
      - run: semgrep scan --error --config p/python --config p/secrets

  security-review:
    name: Claude security review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      # Independent AI security review of the diff — complements the deterministic scanners.
      # Requires repo secret ANTHROPIC_API_KEY.
      - uses: anthropics/claude-code-security-review@main
        with:
          claude-api-key: ${{ secrets.ANTHROPIC_API_KEY }}
          comment-pr: true
