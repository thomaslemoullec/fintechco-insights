<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>FinTechCo · Macro Insights</title>
  <meta name="description" content="Internal economic-indicators dashboard — inflation, unemployment and the federal funds rate." />
  <link rel="stylesheet" href="/assets/styles.css" />
</head>
<body>
  <!-- Error banner: un-hidden by app.js if a fetch fails. Never a blank page. -->
  <div id="error-banner" class="error-banner" role="alert" hidden></div>

  <!-- App shell: fixed sidebar nav + scrolling main pane. -->
  <div class="app">
    <!-- ===================== Sidebar nav ===================== -->
    <aside class="sidebar">
      <a class="wordmark" href="#/home">
        <span class="wordmark__brand">FinTechCo</span>
        <span class="wordmark__product">Macro Insights</span>
      </a>

      <!-- Client-side hash routes. app.js toggles .is-active on route change.
           Every link's href IS the route; data-route mirrors it for matching. -->
      <nav class="nav" aria-label="Primary">
        <a class="nav__link" data-route="#/home" href="#/home">Home</a>

        <div class="nav__group">
          <p class="nav__group-label">Financial Indicators</p>
          <a class="nav__link nav__link--sub" data-route="#/indicators/macro" href="#/indicators/macro">Macro</a>
          <a class="nav__link nav__link--sub" data-route="#/indicators/macro/phillips" href="#/indicators/macro/phillips">Inflation vs. Unemployment</a>
          <a class="nav__link nav__link--sub" data-route="#/indicators/micro" href="#/indicators/micro">Micro</a>
        </div>

        <a class="nav__link" data-route="#/trends" href="#/trends">Trends</a>
        <a class="nav__link" data-route="#/markets" href="#/markets">Markets</a>
      </nav>

      <p class="sidebar__foot">Internal research tool · US data via FRED</p>
    </aside>

    <!-- ===================== Main pane ===================== -->
    <main class="main">
      <div class="topbar">
        <h1 class="topbar__title" id="page-title">Home</h1>
        <!-- "Data as of" pill; populated from an indicator series (/api/series/UNRATE) as_of. -->
        <div class="asof-pill" id="asof-pill" hidden>
          Data as of <span id="asof-date">—</span>
        </div>
      </div>

      <!-- Active view is rendered here by app.js on every route change. -->
      <div id="view-root" class="view"></div>
    </main>
  </div>

  <!-- ECharts (vendored, Apache v5) exposes the global `echarts`; load before the module. -->
  <script src="/assets/vendor/echarts.min.js"></script>
  <script type="module" src="/assets/app.js"></script>
</body>
</html>
